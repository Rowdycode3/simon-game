<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Game By Rowdy</title>

    <link
      rel="shortcut icon"
      href="./images/favicon-R-32x32.png"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="container">
      <button id="start">Press To Start</button>

      <section class="boxs">
        <div id="green" class="btn green"></div>
        <div id="red" class="btn red"></div>
        <div id="yellow" class="btn yellow"></div>
        <div id="blue" class="btn blue"></div>
      </section>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
